# Real selected clean variant for single degradation generation.
# 注意：真实 clean 没有可靠 GT star/target mask，建议主要用于视觉校准和真实域验证，不作为第一轮 executor 监督训练主数据。

clean_source:
  domain: real
  name: real_selected_v001
  root_dir: STAR_Agent/data/clean/real_selected_v001
  manifest_path: STAR_Agent/data/clean/real_selected_v001/manifest.jsonl

source_clean:
  root_dir: STAR_Agent/data/clean/real_selected_v001
  manifest_path: STAR_Agent/data/clean/real_selected_v001/manifest.jsonl

output:
  root_dir: STAR_Agent/data/degraded/real/real_selected_v001/single
  overwrite_existing: false
  save_field: true
  save_mask: true
  save_meta: true

levels: [1, 2, 3, 4, 5]

categories:
  noise:
    modes: [gaussian, poisson, dark_current, background, mixed]
  smear:
    modes: [column_bias, row_bias, bright_source_vertical, mixed]
  cosmic_ray:
    modes: [point, line, blob, mixed]
  dead_pixels:
    modes: [sparse_hot, sparse_dead, clustered_hot, dead_column, mixed]
  dqg:
    modes: [left, right, top, bottom, top_left, top_right, bottom_left, bottom_right, diffuse]
  solar_stray_light:
    modes: [grazing_solar_limb, single_internal_ghost, multi_reflection_ghosts, veiling_glare_bleed]
  motion_blur:
    modes: [linear, curved, non_uniform, jitter]

noise:
  mask_threshold_by_level: {1: 0.006, 2: 0.010, 3: 0.017, 4: 0.026, 5: 0.040}
smear:
  mask_threshold_by_level: {1: 0.004, 2: 0.007, 3: 0.012, 4: 0.020, 5: 0.032}
cosmic_ray:
  mask_threshold_by_level: {1: 0.020, 2: 0.035, 3: 0.055, 4: 0.075, 5: 0.090}
dead_pixels:
  mask_threshold_by_level: {1: 0.080, 2: 0.100, 3: 0.120, 4: 0.140, 5: 0.160}
dqg:
  mask_threshold_by_level: {1: 0.010, 2: 0.020, 3: 0.040, 4: 0.075, 5: 0.115}
solar_stray_light:
  side_weights: {top_left: 0.34, top_right: 0.34, left: 0.10, right: 0.10, bottom_left: 0.06, bottom_right: 0.06}
  mask_threshold_by_level: {1: 0.020, 2: 0.034, 3: 0.060, 4: 0.095, 5: 0.135}
motion_blur:
  mask_threshold_by_level: {1: 0.006, 2: 0.009, 3: 0.013, 4: 0.018, 5: 0.024}
